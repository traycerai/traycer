name: pre-commit

# The static-analysis gate: hygiene hooks + project checks (build / compile /
# lint / format) via .pre-commit-config.yaml's workspace-checks hook. Tests run
# separately (test.yml) so they start in parallel. No secrets.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: pre-commit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    env:
      # Drive `nx affected` in the workspace-checks hook off the PR base.
      NX_BASE: ${{ github.event.pull_request.base.sha }}
      NX_HEAD: ${{ github.event.pull_request.head.sha }}
    steps:
      # TODO(hardening): pin third-party actions to commit SHAs.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # nx affected needs history to diff against the base
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - uses: pre-commit/action@v3.0.1
