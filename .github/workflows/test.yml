name: Tests

# Tests run as their own workflow so they start in parallel with the static
# checks (build/typecheck/lint/format). Each nx test project runs as its own
# matrix job, so total wall-clock is the slowest single project rather than the
# sum of all three. No secrets.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      # Run every project even if one fails, so a single red project doesn't
      # mask the others.
      fail-fast: false
      matrix:
        # The nx projects that own a `test` target. Names are exact nx project
        # names (gui-app's differs from its package scope). Keep in sync with
        # `nx show projects --with-target test`.
        project:
          - "@traycer/protocol"
          - traycer-clients-gui-app
          - "@traycer-clients/desktop"
          - "@traycer-clients/traycer-cli"
    steps:
      # TODO(hardening): pin third-party actions to commit SHAs (migration plan, Phase 6).
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Cache bun global install cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Test
        run: bunx nx run-many --target=test --projects="${{ matrix.project }}" --tui=false
