name: Tests

# Tests run as their own workflow so they start in parallel with the static
# checks (build/typecheck/lint/format). Each nx test project runs as its own
# matrix job, so total wall-clock is the slowest single project rather than the
# sum of all three. No secrets.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.project }})
    runs-on: ${{ matrix.project == 'traycer-clients-gui-app' && 'ubuntu-latest-8-cores' || 'ubuntu-latest' }}
    strategy:
      # Run every project even if one fails, so a single red project doesn't
      # mask the others.
      fail-fast: false
      matrix:
        # The nx projects that own a `test` target. Names are exact nx project
        # names (gui-app's differs from its package scope). Keep in sync with
        # `nx show projects --with-target test`.
        project:
          - "@traycer/protocol"
          - traycer-clients-gui-app
          - "@traycer-clients/desktop"
          - "@traycer-clients/shared"
          - "@traycer-clients/traycer-cli"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
      - name: Cache bun global install cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Test
        run: bunx nx run-many --target=test --projects="${{ matrix.project }}" --tui=false

  # macOS job: the desktop workspace's packaging/signing-adjacent assertions
  # (prepack unit suite + the real electron-builder pack in test:packaging)
  # are `skipIf(platform !== "darwin")`-gated and silently skip on the ubuntu
  # matrix above. Without this job the release-critical helper/plist
  # injection (BundleProgram relativity, NumberOfFiles=8192, relocation,
  # real-pack wiring) has no CI coverage at all. The full desktop unit suite
  # runs here too so darwin-only regressions surface; every launchctl-adjacent
  # test in it forces `process.platform` OFF darwin internally, so nothing in
  # this job can touch the runner's real launchd/BTM state.
  test-macos-packaging:
    name: test (desktop darwin + packaging)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.12"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
      - name: Cache bun global install cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Desktop unit tests (darwin-gated blocks included)
        run: bunx nx run-many --target=test --projects="@traycer-clients/desktop" --tui=false
      - name: Real electron-builder packaging test
        run: bun run test:packaging
        working-directory: clients/desktop
