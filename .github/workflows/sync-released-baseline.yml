name: Sync Released Baseline Fixture

# When a host/cli/desktop release tag lands, regenerate the in-tree released
# baseline surface fixture used by released-baseline-compat.test.ts and open
# a mechanical PR if it changed. No human decision beyond merging the PR.

on:
  push:
    tags:
      - "host-v*"
      - "cli-v*"
      - "desktop-v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-released-baseline
  cancel-in-progress: false

jobs:
  sync-released-baseline:
    runs-on: ubuntu-latest
    permissions:
      # Push the bot/sync-released-baseline branch.
      contents: write
      # Open or update the mechanical fixture PR.
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Always refresh the fixture against main, even when this run was
          # triggered by a tag push (which would otherwise leave HEAD detached
          # on the tag).
          ref: main
          fetch-depth: 0
          # Git auth comes from GH_TOKEN via `gh auth setup-git` below, so the
          # bot-token path (when configured) is what pushes the branch.
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.12"
      - name: Cache bun global install cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Snapshot newest released baseline surface
        run: bun run protocol/scripts/compat/snapshot-released-baseline.ts origin
      - name: Open or update PR when the fixture changed
        env:
          # A dedicated bot token makes the generated PR trigger CI —
          # GITHUB_TOKEN-authored pushes/PRs never start workflow runs (GitHub
          # restriction). Falls back to GITHUB_TOKEN when the secret is unset:
          # the PR still opens, but its checks must be started manually
          # (re-run from the UI or push to the bot branch).
          GH_TOKEN: ${{ secrets.TRAYCER_RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          fixture="protocol/src/host/__tests__/__fixtures__/released-baseline-surface.json"
          if [ -z "$(git status --porcelain -- "$fixture")" ]; then
            echo "::notice::Released baseline fixture already up to date; nothing to PR."
            exit 0
          fi

          branch="bot/sync-released-baseline"
          git config user.name "traycer-release-bot"
          git config user.email "release@traycer.ai"
          # Route git pushes through GH_TOKEN (bot token when configured).
          gh auth setup-git

          # Keep the regenerated fixture, then publish it on an idempotent bot
          # branch always rebased onto current main (single-file mechanical PR).
          tmpdir="$(mktemp -d)"
          cp -- "$fixture" "$tmpdir/released-baseline-surface.json"
          git checkout -B "$branch" main
          mkdir -p "$(dirname "$fixture")"
          cp -- "$tmpdir/released-baseline-surface.json" "$fixture"
          git add -- "$fixture"
          if git diff --cached --quiet; then
            echo "::notice::main already has this fixture content; nothing to PR."
            exit 0
          fi

          git commit -s -m "protocol: sync released-baseline-surface.json" \
            -m "Mechanical refresh of the newest released protocol surface fixture used by released-baseline-compat.test.ts."
          git push --force origin "$branch"

          body="Automated refresh of \`protocol/src/host/__tests__/__fixtures__/released-baseline-surface.json\` after a host/cli/desktop release tag. Generated by \`sync-released-baseline.yml\` via \`snapshot-released-baseline.ts\`. Mechanical only — merge to keep the local unit-test tripwire on the newest released baseline."
          existing="$(gh pr list --head "$branch" --state open --json number --jq '.[0].number // empty')"
          if [ -n "$existing" ]; then
            echo "::notice::PR #${existing} already open for ${branch}; updated its branch."
          else
            gh pr create --base main --head "$branch" \
              --title "protocol: sync released baseline surface fixture" \
              --body "$body"
          fi
