name: Scorecard supply-chain security

# OpenSSF Scorecard — security health metrics, published so the README badge
# auto-updates. Activates once the repo is public. https://scorecard.dev
on:
  branch_protection_rule:
  schedule:
    - cron: "0 6 * * 1"
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    # Scorecard publishes results + the README badge only for the public repo
    # (github.com/traycerai/traycer) and cannot publish from a private repo, so
    # skip it on the private staging mirror.
    if: ${{ github.repository == 'traycerai/traycer' }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload SARIF to code scanning
      id-token: write # publish results (badge + API)
    steps:
      # TODO(hardening): pin third-party actions to commit SHAs.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
