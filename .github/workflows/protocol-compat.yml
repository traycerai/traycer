name: Protocol Compatibility

# Released-peer compatibility gate. Guards the client⇄host wire contract
# against every released baseline still in the field:
#
#  - `resolve-baselines` derives the protected set from the remote's release
#    tags AT RUN TIME (never from a file in the tree, so a PR cannot shrink
#    it). The only in-tree knob is `protocol/scripts/compat/support-floor.json`
#    - guarded by the tripwire job below.
#  - `released-peer-compat` dumps each baseline's protocol surface from its
#    immutable tag in a git worktree, then checks the PR tree against it
#    (two-sided handshake bridging + same-version wire-schema rules) and
#    drives the real client transports against the baseline's manifests.
#  - `guarded-files-tripwire` fails any PR that edits the compat governance
#    files without the `protocol-compat-override` label, making baseline
#    regeneration a deliberate, reviewable act. This closes the failure mode
#    that shipped `terminal.defaultCwd` (#227): the frozen-fixture test went
#    red and was silenced by editing the fixture in the same PR.
#
# All three jobs must be required status checks on `main`.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: protocol-compat-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-baselines:
    runs-on: ubuntu-latest
    outputs:
      baselines: ${{ steps.resolve.outputs.baselines }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.12"
      - run: bun install --frozen-lockfile
      - name: Resolve released baselines from remote tags
        id: resolve
        env:
          # For fork PRs the protected tag set is the BASE repo's, not the fork's.
          BASE_REPO_URL: ${{ github.event.pull_request.base.repo.clone_url || format('https://github.com/{0}.git', github.repository) }}
        run: |
          baselines=$(bun run protocol/scripts/compat/resolve-baselines.ts "$BASE_REPO_URL" | jq -c '.baselines')
          echo "Protected baselines: $baselines"
          echo "baselines=$baselines" >> "$GITHUB_OUTPUT"

  released-peer-compat:
    name: compat vs ${{ join(matrix.baseline.tags, ', ') }}
    needs: resolve-baselines
    runs-on: ubuntu-latest
    strategy:
      # Every baseline reports independently; one red baseline must not mask
      # the others.
      fail-fast: false
      matrix:
        baseline: ${{ fromJSON(needs.resolve-baselines.outputs.baselines) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.12"
      - name: Cache bun global install cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - name: Dump the working tree's protocol surface
        run: |
          mkdir -p /tmp/surfaces
          bun run protocol/scripts/compat/dump-protocol-surface.ts > /tmp/working-tree.json
      - name: Dump the released baseline's protocol surface from its tag
        env:
          BASELINE_SHA: ${{ matrix.baseline.sha }}
          BASELINE_LABEL: ${{ matrix.baseline.tags[0] }}
        run: |
          git fetch --no-tags origin "$BASELINE_SHA"
          git worktree add --detach /tmp/baseline "$BASELINE_SHA"
          # Baselines that predate the compat tooling get the (self-contained)
          # dump script injected; newer tags run their own committed copy.
          mkdir -p /tmp/baseline/protocol/scripts/compat
          [ -f /tmp/baseline/protocol/scripts/compat/dump-protocol-surface.ts ] || \
            cp protocol/scripts/compat/dump-protocol-surface.ts /tmp/baseline/protocol/scripts/compat/
          [ -f /tmp/baseline/protocol/src/framework/surface-build.ts ] || \
            cp protocol/src/framework/surface-build.ts /tmp/baseline/protocol/src/framework/
          cd /tmp/baseline
          bun install
          bun run protocol/scripts/compat/dump-protocol-surface.ts > "/tmp/surfaces/${BASELINE_LABEL}.json"
      - name: Check surface compatibility (two-sided handshake + wire schemas)
        env:
          BASELINE_LABEL: ${{ matrix.baseline.tags[0] }}
        run: |
          bun run protocol/scripts/compat/check-protocol-compat.ts \
            --mine /tmp/working-tree.json \
            --baseline "${BASELINE_LABEL}=/tmp/surfaces/${BASELINE_LABEL}.json"
      - name: Drive the real client transports against the released manifests
        env:
          PROTOCOL_BASELINE_SURFACES_DIR: /tmp/surfaces
        run: |
          cd clients/shared
          bunx vitest run host-transport/__tests__/released-baseline-handshake.test.ts

  guarded-files-tripwire:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Fail when compat governance files change without the override label
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha }}
          HAS_OVERRIDE_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'protocol-compat-override') }}
        run: |
          guarded='protocol/scripts/compat/compat-exceptions.json
          protocol/scripts/compat/support-floor.json
          protocol/src/host/__tests__/__fixtures__/released-method-names.ts'
          changed=$(git diff --name-only "$BASE_REF"...HEAD)
          hits=$(grep -Fxf <(echo "$guarded") <(echo "$changed") || true)
          if [ -n "$hits" ] && [ "$HAS_OVERRIDE_LABEL" != "true" ]; then
            echo "The following protocol-compat governance files changed without the 'protocol-compat-override' label:"
            echo "$hits"
            echo
            echo "Editing these files relaxes the released-peer compatibility gate."
            echo "If this is a deliberate, protocol-owner-reviewed decision, add the"
            echo "'protocol-compat-override' label to this PR."
            exit 1
          fi
          echo "No unguarded compat governance changes."
