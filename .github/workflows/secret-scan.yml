name: Secret scan

# Continuous secret scanning on every PR and push — catches accidental commits
# of credentials before they reach a release. We invoke the gitleaks CLI (MIT,
# free for everyone) directly instead of gitleaks-action@v2, which requires a
# paid license for GitHub organizations. Known-safe false positives (public test
# fixtures) are allowlisted in .gitleaks.toml at the repo root.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history so gitleaks can scan every commit

      - name: Run gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks git . --no-banner --redact --verbose
